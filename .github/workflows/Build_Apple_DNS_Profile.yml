name: Build Apple DNS Profile

on:
  workflow_dispatch:
    inputs:
      json:
        description: 'AdGuard JSON'
        required: false
        type: string
      domains:
        description: '手动输入域名列表，每行一个'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 获取仓库
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 设置 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. 保存用户输入
      - name: Save Inputs
        working-directory: Apple/DNS
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.json }}" ]; then
            echo '${{ github.event.inputs.json }}' > input.json
          else
            echo '{}' > input.json
          fi

          if [ -n "${{ github.event.inputs.domains }}" ]; then
            printf "%s" '${{ github.event.inputs.domains }}' > input_domains.txt
          else
            touch input_domains.txt
          fi

      # 4. 生成 DNS Profile
      - name: Generate DNS Profile
        working-directory: Apple/DNS
        run: python scripts/generate.py

      # 5. 统一发布文件名
      - name: Rename Asset
        working-directory: Apple/DNS
        run: |
          cp output/dns.mobileconfig output/apple-dns.mobileconfig

      # 6. 提交更新到仓库
      - name: Commit Files
        working-directory: Apple/DNS
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add data/ad_domains.txt
          git add output/dns.mobileconfig
          git add output/apple-dns.mobileconfig

          git commit -m "Auto update Apple DNS profile" || echo "No changes"

          git push

      # 7. 删除旧 Tag
      - name: Delete old tag
        continue-on-error: true
        run: |
          git tag -d apple-dns-latest || true
          git push origin :refs/tags/apple-dns-latest || true

      # 8. 创建新 Tag
      - name: Create latest tag
        run: |
          git tag apple-dns-latest
          git push origin apple-dns-latest --force

      # 9. 上传 Release
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apple-dns-latest
          name: Apple DNS Profile
          files: Apple/DNS/output/apple-dns.mobileconfig